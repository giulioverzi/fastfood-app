<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fast Food App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">
        <i class="fas fa-burger"></i>
        <span>Fast Food</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Ristoranti</a></li>
        <li id="cartIcon"></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="auth-container auth-container-login">
    <div class="auth-form-wrapper">
      <div class="card auth-card">
        <div class="card-header">
          <h2 class="card-title text-center">Login</h2>
        </div>
        <div class="card-body">
          <div id="alert"></div>
          <form id="loginForm">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full-width">Accedi</button>
          </form>
          
          <p class="text-center mt-1">
            Non hai un account? <a href="/register.html" class="link-primary">Registrati</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
