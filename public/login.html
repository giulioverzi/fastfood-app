<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fast Food App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">🍔 Fast Food</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/login.html" class="btn btn-primary">Login</a></li>
        <li><a href="/register.html" class="btn btn-secondary">Registrati</a></li>
      </ul>
    </nav>
  </header>

  <section class="auth-container" style="background-image: url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1200&h=800&fit=crop');">
    <div style="max-width: 500px; margin: 0 auto; width: 100%; padding: 2rem;">
      <div class="card auth-card">
        <div class="card-header">
          <h2 class="card-title text-center">Login</h2>
        </div>
        <div class="card-body">
          <div id="alert"></div>
          <form id="loginForm">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Accedi</button>
          </form>
          
          <p class="text-center mt-1">
            Non hai un account? <a href="/register.html" style="color: var(--primary-color); font-weight: bold;">Registrati</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
