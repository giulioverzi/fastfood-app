<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Fast Food App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">🍔 Fast Food</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Menu</a></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="hero" style="padding: 2rem 0; background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&h=300&fit=crop');">
    <div class="container">
      <h1>Menu</h1>
      <p>Esplora i nostri deliziosi piatti</p>
    </div>
  </section>

  <section class="container mt-2 mb-2">
    <!-- Filters -->
    <div class="filters">
      <h3 class="mb-1">Filtra per:</h3>
      <div class="filter-group">
        <div class="form-group" style="margin: 0;">
          <label for="restaurantFilter">Ristorante</label>
          <select id="restaurantFilter" class="form-control">
            <option value="">Tutti i ristoranti</option>
          </select>
        </div>
        
        <div class="form-group" style="margin: 0;">
          <label for="categoryFilter">Categoria</label>
          <select id="categoryFilter" class="form-control">
            <option value="">Tutte le categorie</option>
            <option value="antipasti">Antipasti</option>
            <option value="primi">Primi</option>
            <option value="secondi">Secondi</option>
            <option value="contorni">Contorni</option>
            <option value="dessert">Dessert</option>
            <option value="bevande">Bevande</option>
            <option value="panini">Panini</option>
            <option value="pizze">Pizze</option>
            <option value="insalate">Insalate</option>
          </select>
        </div>
        
        <div class="form-group" style="margin: 0;">
          <label>
            <input type="checkbox" id="vegetarianoFilter"> Vegetariano
          </label>
        </div>
        
        <div class="form-group" style="margin: 0;">
          <label>
            <input type="checkbox" id="veganoFilter"> Vegano
          </label>
        </div>
      </div>
    </div>

    <!-- Menu Items -->
    <div id="loading" class="loading">Caricamento menu...</div>
    <div id="menuContainer" class="grid hidden"></div>
    <div id="emptyMessage" class="hidden text-center">
      <p>Nessun piatto disponibile.</p>
    </div>
  </section>

  <!-- Cart Summary (visible only for logged in clients) -->
  <div id="cartSummary" class="hidden" style="position: fixed; bottom: 20px; right: 20px; z-index: 50;">
    <div class="card" style="min-width: 200px;">
      <div class="card-body">
        <h4>Carrello</h4>
        <p id="cartCount">0 piatti</p>
        <a href="/order.html" class="btn btn-primary" style="width: 100%;">Vai al Carrello</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/menu.js"></script>
</body>
</html>
