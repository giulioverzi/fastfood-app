<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ristoranti - Fast Food App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <nav class="container">
      <a href="/" class="logo">
        <i class="fas fa-burger"></i>
        <span>Fast Food</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Ristoranti</a></li>
        <li id="cartIcon"></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero hero-compact">
    <div class="container">
      <h1><i class="fas fa-store"></i> I Nostri Ristoranti</h1>
      <p>Scopri tutti i ristoranti disponibili e ordina i tuoi piatti preferiti</p>
    </div>
  </section>

  <!-- Filters Section -->
  <section class="container mt-2">
    <div class="filters">
      <div class="filter-group">
        <label for="nameFilter"><i class="fas fa-search"></i> Nome:</label>
        <input type="text" id="nameFilter" class="form-control" placeholder="Cerca per nome...">

        <label for="locationFilter" class="filter-label-spacing"><i class="fas fa-map-marker-alt"></i> Località:</label>
        <input type="text" id="locationFilter" class="form-control" placeholder="Cerca per città...">
      </div>
    </div>
  </section>

  <!-- Restaurants Section -->
  <section class="container mt-2 mb-2">
    <div id="alert"></div>
    <div id="restaurantsLoading" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Caricamento ristoranti...
    </div>
    <div id="restaurantsContainer" class="grid hidden"></div>
    <div id="restaurantsEmpty" class="hidden text-center">
      <i class="fas fa-exclamation-circle empty-state-icon"></i>
      <p>Nessun ristorante disponibile con i filtri selezionati.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/scripts/common.js"></script>
  <script src="/scripts/menu.js"></script>
</body>
</html>
