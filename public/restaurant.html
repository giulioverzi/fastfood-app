<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Ristorante - Fast Food App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <nav class="container">
      <a href="/" class="logo">
        <i class="fas fa-burger"></i>
        <span>Fast Food</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Ristoranti</a></li>
        <li id="cartIcon"></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero hero-compact">
    <div class="container">
      <div id="restaurantHeader">
        <h1><i class="fas fa-spinner fa-spin"></i> Caricamento...</h1>
      </div>
    </div>
  </section>

  <!-- Filters Section -->
  <section class="container mt-2">
    <div class="filters">
      <div class="filter-group">
        <label for="categoryFilter"><i class="fas fa-filter"></i> Categoria:</label>
        <select id="categoryFilter" class="form-control filter-select-category">
          <option value="">Tutte</option>
          <option value="antipasti">Antipasti</option>
          <option value="primi">Primi</option>
          <option value="secondi">Secondi</option>
          <option value="contorni">Contorni</option>
          <option value="dessert">Dessert</option>
          <option value="bevande">Bevande</option>
          <option value="panini">Panini</option>
          <option value="pizze">Pizze</option>
          <option value="insalate">Insalate</option>
        </select>

        <label for="priceFilter" class="filter-label-spacing"><i class="fas fa-euro-sign"></i> Prezzo max:</label>
        <input type="number" id="priceFilter" class="form-control" placeholder="Es. 20" min="0" step="0.5">

        <label class="filter-label-spacing">
          <input type="checkbox" id="vegetarianFilter"> Vegetariano
        </label>
        <label class="filter-label-spacing-small">
          <input type="checkbox" id="veganFilter"> Vegano
        </label>
        
        <label for="allergenFilter" class="filter-label-spacing"><i class="fas fa-exclamation-triangle"></i> Escludi allergeni:</label>
        <select id="allergenFilter" class="form-control filter-select-restaurant" multiple>
          <option value="glutine">Glutine</option>
          <option value="lattosio">Lattosio</option>
          <option value="uova">Uova</option>
          <option value="arachidi">Arachidi</option>
          <option value="frutta_a_guscio">Frutta a guscio</option>
          <option value="soia">Soia</option>
          <option value="pesce">Pesce</option>
          <option value="crostacei">Crostacei</option>
          <option value="molluschi">Molluschi</option>
          <option value="sedano">Sedano</option>
          <option value="senape">Senape</option>
          <option value="sesamo">Sesamo</option>
          <option value="solfiti">Solfiti</option>
        </select>
      </div>
      <p class="text-info-small">
        <i class="fas fa-info-circle"></i> Tieni premuto Ctrl (o Cmd su Mac) per selezionare più allergeni
      </p>
    </div>
  </section>

  <!-- Menu Items Section -->
  <section class="container mt-2 mb-2">
    <div id="alert"></div>
    <div id="menuLoading" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Caricamento menu...
    </div>
    <div id="menuContainer" class="grid hidden"></div>
    <div id="menuEmpty" class="hidden text-center">
      <i class="fas fa-exclamation-circle empty-state-icon"></i>
      <p>Nessun piatto disponibile con i filtri selezionati.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/restaurant.js"></script>
</body>
</html>
