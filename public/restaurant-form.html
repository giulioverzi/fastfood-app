<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Ristorante - Fast Food App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">🍔 Fast Food</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Menu</a></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="hero" style="padding: 2rem 0;">
    <div class="container">
      <h1 id="pageTitle">Nuovo Ristorante</h1>
      <p>Inserisci i dettagli del tuo ristorante</p>
    </div>
  </section>

  <section class="container mt-2 mb-2">
    <div style="max-width: 800px; margin: 0 auto;">
      <div class="card">
        <div class="card-body">
          <div id="alert"></div>
          
          <form id="restaurantForm">
            <div class="form-group">
              <label for="nome">Nome Ristorante *</label>
              <input type="text" id="nome" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="descrizione">Descrizione *</label>
              <textarea id="descrizione" class="form-control" rows="4" maxlength="500" required></textarea>
              <small>Max 500 caratteri</small>
            </div>

            <div class="form-group">
              <label for="telefono">Telefono *</label>
              <input type="tel" id="telefono" class="form-control" required>
            </div>

            <h3 class="mb-1">Indirizzo</h3>

            <div class="form-group">
              <label for="via">Via *</label>
              <input type="text" id="via" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="citta">Città *</label>
              <input type="text" id="citta" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="cap">CAP *</label>
              <input type="text" id="cap" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="orariApertura">Orari Apertura</label>
              <input type="text" id="orariApertura" class="form-control" 
                     placeholder="Es: Lun-Dom: 11:00-23:00" value="Lun-Dom: 11:00-23:00">
            </div>

            <div style="display: flex; gap: 1rem;">
              <button type="submit" class="btn btn-primary">Salva Ristorante</button>
              <a href="/dashboard.html" class="btn btn-outline">Annulla</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/restaurant-form.js"></script>
</body>
</html>
