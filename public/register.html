<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - Fast Food App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">
        <i class="fas fa-burger"></i>
        <span>Fast Food</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Ristoranti</a></li>
        <li id="cartIcon"></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="auth-container auth-container-register">
    <div class="auth-form-wrapper-wide">
      <div class="card auth-card">
        <div class="card-header">
          <h2 class="card-title text-center">Registrazione</h2>
        </div>
        <div class="card-body">
          <div id="alert"></div>
          <form id="registerForm">
            <div class="form-group">
              <label for="nome">Nome *</label>
              <input type="text" id="nome" class="form-control" required>
            </div>
            
            <div class="form-group">
              <label for="cognome">Cognome *</label>
              <input type="text" id="cognome" class="form-control" required>
            </div>
            
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            
            <div class="form-group">
              <label for="password">Password (min 6 caratteri) *</label>
              <input type="password" id="password" class="form-control" required minlength="6">
            </div>
            
            <div class="form-group">
              <label for="ruolo">Tipo di account *</label>
              <select id="ruolo" class="form-control" required>
                <option value="cliente">Cliente</option>
                <option value="ristoratore">Ristoratore</option>
              </select>
            </div>
            
            <div class="form-group" id="partitaIVAGroup" style="display: none;">
              <label for="partitaIVA">Partita IVA (11 cifre) *</label>
              <input type="text" id="partitaIVA" class="form-control" pattern="\d{11}" maxlength="11" placeholder="Es: 12345678901">
              <small class="form-text">Obbligatorio per i ristoratori</small>
            </div>
            
            <div class="form-group">
              <label for="telefono">Telefono</label>
              <input type="tel" id="telefono" class="form-control">
            </div>
            
            <div class="form-group">
              <label for="via">Via</label>
              <input type="text" id="via" class="form-control">
            </div>
            
            <div class="form-group">
              <label for="citta">Città</label>
              <input type="text" id="citta" class="form-control">
            </div>
            
            <div class="form-group">
              <label for="cap">CAP</label>
              <input type="text" id="cap" class="form-control">
            </div>
            
            <button type="submit" class="btn btn-primary btn-full-width">Registrati</button>
          </form>
          
          <p class="text-center mt-1">
            Hai già un account? <a href="/login.html" class="link-primary">Accedi</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/scripts/common.js"></script>
  <script src="/scripts/register.js"></script>
</body>
</html>
