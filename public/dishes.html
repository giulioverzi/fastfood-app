<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Menu - Fast Food App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">🍔 Fast Food</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Menu</a></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="hero" style="padding: 2rem 0;">
    <div class="container">
      <h1 id="restaurantName">Gestione Menu</h1>
      <p>Aggiungi e gestisci i piatti del tuo ristorante</p>
    </div>
  </section>

  <section class="container mt-2 mb-2">
    <div id="alert"></div>

    <div class="mb-2">
      <button class="btn btn-primary" onclick="showDishForm()">+ Nuovo Piatto</button>
      <a href="/dashboard.html" class="btn btn-outline">Torna alla Dashboard</a>
    </div>

    <!-- Form Piatto (inizialmente nascosto) -->
    <div id="dishFormContainer" class="card mb-2 hidden">
      <div class="card-header">
        <h3 class="card-title" id="formTitle">Nuovo Piatto</h3>
      </div>
      <div class="card-body">
        <form id="dishForm">
          <div class="form-group">
            <label for="nome">Nome Piatto *</label>
            <input type="text" id="nome" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="descrizione">Descrizione *</label>
            <textarea id="descrizione" class="form-control" rows="3" maxlength="300" required></textarea>
            <small>Max 300 caratteri</small>
          </div>

          <div class="form-group">
            <label for="categoria">Categoria *</label>
            <select id="categoria" class="form-control" required>
              <option value="">Seleziona una categoria</option>
              <option value="antipasti">Antipasti</option>
              <option value="primi">Primi</option>
              <option value="secondi">Secondi</option>
              <option value="contorni">Contorni</option>
              <option value="dessert">Dessert</option>
              <option value="bevande">Bevande</option>
              <option value="panini">Panini</option>
              <option value="pizze">Pizze</option>
              <option value="insalate">Insalate</option>
            </select>
          </div>

          <div class="form-group">
            <label for="prezzo">Prezzo (€) *</label>
            <input type="number" id="prezzo" class="form-control" step="0.01" min="0" required>
          </div>

          <div class="form-group">
            <label for="ingredienti">Ingredienti (separati da virgola)</label>
            <input type="text" id="ingredienti" class="form-control" 
                   placeholder="Es: pane, carne, insalata, pomodoro">
          </div>

          <div class="form-group">
            <label for="allergeni">Allergeni</label>
            <select id="allergeni" class="form-control" multiple size="5">
              <option value="glutine">Glutine</option>
              <option value="crostacei">Crostacei</option>
              <option value="uova">Uova</option>
              <option value="pesce">Pesce</option>
              <option value="arachidi">Arachidi</option>
              <option value="soia">Soia</option>
              <option value="latte">Latte</option>
              <option value="frutta_a_guscio">Frutta a guscio</option>
              <option value="sedano">Sedano</option>
              <option value="senape">Senape</option>
              <option value="sesamo">Sesamo</option>
              <option value="solfiti">Solfiti</option>
              <option value="lupini">Lupini</option>
              <option value="molluschi">Molluschi</option>
            </select>
            <small>Tieni premuto Ctrl (o Cmd) per selezionare più opzioni</small>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="vegetariano"> Vegetariano
            </label>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="vegano"> Vegano
            </label>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="disponibile" checked> Disponibile
            </label>
          </div>

          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Salva Piatto</button>
            <button type="button" class="btn btn-outline" onclick="hideDishForm()">Annulla</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Lista Piatti -->
    <div id="dishesContainer">
      <div class="loading">Caricamento piatti...</div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/dishes.js"></script>
</body>
</html>
