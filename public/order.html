<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordina - Fast Food App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="/" class="logo">🍔 Fast Food</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/menu.html">Menu</a></li>
        <li id="authLinks"></li>
      </ul>
    </nav>
  </header>

  <section class="hero" style="padding: 2rem 0;">
    <div class="container">
      <h1>Il Tuo Ordine</h1>
      <p>Completa il tuo ordine</p>
    </div>
  </section>

  <section class="container mt-2 mb-2">
    <div id="alert"></div>

    <div class="grid-2">
      <!-- Carrello -->
      <div>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Carrello</h2>
          </div>
          <div class="card-body">
            <div id="cartItems"></div>
            <div class="order-total" id="cartTotal"></div>
            <button class="btn btn-outline mt-1" onclick="clearCart()">Svuota Carrello</button>
          </div>
        </div>
      </div>

      <!-- Form Ordine -->
      <div>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Dettagli Consegna</h2>
          </div>
          <div class="card-body">
            <form id="orderForm">
              <div class="form-group">
                <label for="modalitaConsegna">Modalità *</label>
                <select id="modalitaConsegna" class="form-control" required>
                  <option value="ritiro">Ritiro in loco</option>
                  <option value="consegna">Consegna a domicilio</option>
                </select>
              </div>

              <div id="indirizzoFields" class="hidden">
                <div class="form-group">
                  <label for="via">Via *</label>
                  <input type="text" id="via" class="form-control">
                </div>

                <div class="form-group">
                  <label for="citta">Città *</label>
                  <input type="text" id="citta" class="form-control">
                </div>

                <div class="form-group">
                  <label for="cap">CAP *</label>
                  <input type="text" id="cap" class="form-control">
                </div>
              </div>

              <div class="form-group">
                <label for="note">Note aggiuntive</label>
                <textarea id="note" class="form-control" rows="3" maxlength="200"></textarea>
              </div>

              <button type="submit" class="btn btn-primary" style="width: 100%;">
                Conferma Ordine
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2024 Fast Food App - Progetto Programmazione Web e Mobile</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/order.js"></script>
</body>
</html>
